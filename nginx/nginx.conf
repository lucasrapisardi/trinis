events { worker_connections 1024; }

http {
  client_max_body_size 50M;
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;
    listen 443 ssl;
    server_name trinis.ai;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # NextAuth internal routes → frontend
    location ~ ^/api/auth/(session|csrf|providers|signin|signout|callback|_log|error) {
      set $upstream_frontend http://frontend:3000;
      proxy_pass $upstream_frontend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket para job logs
    location /api/jobs/ws/ {
      set $upstream_backend http://backend:8000;
      proxy_pass $upstream_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 3600s;
    }

    # Backend FastAPI
    location /api/ {
      set $upstream_backend http://backend:8000;
      proxy_pass $upstream_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
    }

    # Frontend Next.js
    location / {
      set $upstream_frontend http://frontend:3000;
      proxy_pass $upstream_frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
